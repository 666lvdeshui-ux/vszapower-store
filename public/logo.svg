<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 52" width="340" height="52">
  <defs>
    <!-- Premium Electric Blue to Cyan Gradient for Logo Badge -->
    <linearGradient id="vszaIconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066FF" />
      <stop offset="100%" stop-color="#00D2FF" />
    </linearGradient>

    <!-- Vibrant Power Gradient -->
    <linearGradient id="vszaTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066FF" />
      <stop offset="50%" stop-color="#00C6FF" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <!-- Subtle Glow Effect -->
    <filter id="vszaGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0066FF" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 1. Icon Mark: High-Tech Energy Badge -->
  <g transform="translate(2, 4)" filter="url(#vszaGlow)">
    <!-- Outer Rounded Square Badge -->
    <rect x="0" y="0" width="44" height="44" rx="12" fill="url(#vszaIconGrad)"/>
    
    <!-- Coin Battery Ring Outer Border -->
    <circle cx="22" cy="22" r="15" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-dasharray="4 2"/>
    
    <!-- Lightning Energy Bolt -->
    <path d="M24 10 L14 25 H22 L18 36 L29 21 H21 Z" fill="#FFFFFF" />
  </g>

  <!-- 2. Brand Name & Subtitle -->
  <g transform="translate(58, 33)">
    <!-- VSZAPOWER Main Title -->
    <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="27" letter-spacing="0.5">
      <tspan fill="#FFFFFF">VSZA</tspan>
      <tspan fill="url(#vszaTextGrad)">POWER</tspan>
    </text>
    <!-- Subtitle Tagline -->
    <text x="1" y="11" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" font-weight="700" font-size="8" fill="#94A3B8" letter-spacing="2.2">SMART RECHARGE TECH</text>
  </g>
</svg>
